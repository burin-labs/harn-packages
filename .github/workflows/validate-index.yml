name: Validate index

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: CI status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate package index
        run: python3 scripts/validate_index.py
